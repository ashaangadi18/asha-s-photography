<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="main_box">
        <!-- Hidden Checkbox -->
        <input type="checkbox" id="check">

        <!-- Menu Button -->
        <div class="btn_one">
            <label for="check">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

        <!-- Sidebar -->
        <div class="sidebar_menu">
            <div class="logo">
                <a href="#">asha's Photography</a>
            </div>

            <div class="btn_two">
                <label for="check">
                    <i class="fa-solid fa-xmark"></i>
                </label>
            </div>

            <div class="menu">
                <ul>
                    <li><i class="fa-solid fa-image"></i> <a href="#">Gallery</a></li>
                    <li><i class="fa-solid fa-arrow-up-right-from-square"></i> <a href="#">Shortcuts</a></li>
                    <li><i class="fa-solid fa-file"></i> <a href="#">Files</a></li>
                    <li><i class="fa-solid fa-calendar"></i> <a href="#">Events</a></li>
                    <li><i class="fa-solid fa-store"></i> <a href="#">Store</a></li>
                    <li><i class="fa-solid fa-phone"></i> <a href="#">Contact</a></li>
                    <li><i class="fa-solid fa-comment"></i> <a href="#">Feedback</a></li>
                </ul>
            </div>

            <div class="social_media">
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-pinterest-p"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
